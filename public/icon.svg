<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="100" fill="#4f46e5"/>
  <!-- House shape -->
  <g transform="translate(256,256)">
    <!-- Roof -->
    <polygon points="0,-120 -130,-20 130,-20" fill="white" opacity="0.95"/>
    <!-- Body -->
    <rect x="-95" y="-20" width="190" height="130" rx="6" fill="white" opacity="0.95"/>
    <!-- Door -->
    <rect x="-28" y="40" width="56" height="70" rx="8" fill="#4f46e5"/>
    <!-- Windows -->
    <rect x="-80" y="10" width="44" height="38" rx="6" fill="#c7d2fe"/>
    <rect x="36" y="10" width="44" height="38" rx="6" fill="#c7d2fe"/>
    <!-- Chimney -->
    <rect x="60" y="-110" width="24" height="55" rx="4" fill="white" opacity="0.9"/>
  </g>
</svg>
